continuation_prompt = "[▸▹ ](dimmed white)"

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$fill \
$username\
$hostname\
$sudo\
${custom.os}\
$singularity\
$kubernetes\
$vcsh\
$fossil_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$golang\
$guix_shell\
$shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$vlang\
$vagrant\
$zig\
$buf\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$crystal\
$status\
$localip\
${os}\
${os.symbols}\
$jobs\
$line_break\
$character"""

[fill]
symbol = " "

[custom.os]
command = """ # This only works when fish is the shell 
switch (uname -s)
    case Darwin
        echo " "
    case Linux
        echo " "
    case FreeBSD
        echo " "
    case '*'
        echo "❓"
end
"""
when = true
format = " [$output](bold green) "
disabled = false

[directory]
style = "blue"
read_only = " 󰌾"

truncation_length = 2
truncation_symbol = "□ "

[character]
success_symbol = "[🚀❯](purple)"
error_symbol = "[💥❯](red)"
vimcmd_symbol = "[❮](green)"


[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[jobs]
format = "[$symbol$number]($style) "
style = "white"
symbol = "[▶](blue italic)"

[localip]
ssh_only = true
format = "·[$localipv4](dimmed magenta)"
disabled = false

[username]
style_user = "bright-yellow bold italic"
style_root = "purple bold italic"
format = " [$user]($style)"
disabled = false
show_always = true 

[sudo]
format = "[$symbol]($style)"
style = "bold italic bright-purple"
symbol = "#"
disabled = false


[aws]
symbol = "  "

[bun]
format = "via [$symbol]($style)"

[buf]
symbol = " "
format = "via [$symbol]($style)"

[c]
symbol = " "
format = "via [$symbol]($style)"

[cmake]
format = "via [$symbol]($style)"

[cobol]
format = "via [$symbol]($style)"

[conda]
symbol = " "
format = "via [$symbol]($style)"


[crystal]
